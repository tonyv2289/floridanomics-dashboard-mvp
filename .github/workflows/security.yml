name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit
        run: npm run security:prod

      - name: Full dependency audit
        run: npm run security:audit
