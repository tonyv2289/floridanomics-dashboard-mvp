name: Refresh Data

on:
  schedule:
    # 1st of month: baseline refresh after the BLS metro release window.
    # 18:00 UTC is early afternoon Eastern, so same-day 10 a.m. ET
    # metropolitan releases are available before the pull runs.
    - cron: "0 18 1 * *"
    # 22nd of month: catch the mid-month BLS state employment release
    # (BLS publishes prior-month state data ~3rd week, so this picks it
    # up ~1 week after release instead of waiting for the next 1st)
    - cron: "0 11 22 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh dataset
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: npm run data:refresh

      - name: Validate dataset
        run: npm run data:validate

      - name: Generate what-changed memo
        run: npm run memo:generate

      - name: Snapshot briefing image
        run: bash scripts/snapshot-briefing.sh

      - name: Commit, push, and deploy changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # -I skips runs where only generatedAt/refreshedAt/retrievedAt
          # timestamps moved, so no-op refreshes stop producing commits
          if git diff --quiet -I'At": "' -- public/data/florida-economy.json; then
            echo "No dataset changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/florida-economy.json public/data/what-changed.json public/briefings docs/memos
          git commit -m "chore(data): refresh Florida dashboard dataset"
          git push
          # GITHUB_TOKEN pushes never trigger on:push workflows, so the
          # Pages deploy must be dispatched explicitly or the live site
          # keeps serving the previous dataset
          gh workflow run deploy-pages.yml --ref main
