name: Refresh Data

on:
  schedule:
    - cron: "0 11 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh dataset
        run: npm run data:refresh

      - name: Validate dataset
        run: npm run data:validate

      - name: Commit and push changes
        run: |
          if git diff --quiet -- public/data/florida-economy.json; then
            echo "No dataset changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/florida-economy.json
          git commit -m "chore(data): refresh Florida dashboard dataset"
          git push
